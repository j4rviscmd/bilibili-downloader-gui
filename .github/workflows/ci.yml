# CI workflow for PRs to main branch
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm-format
        with:
          path: node_modules
          key: nm-format-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm-format.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm-lint
        with:
          path: node_modules
          key: nm-lint-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm-lint.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm-build
        with:
          path: node_modules
          key: nm-build-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm-build.outputs.cache-hit != 'true'
        run: npm ci

      - name: Type check and build
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-nm-test
        with:
          path: node_modules
          key: nm-test-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm-test.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run tests
        if: hashFiles('**/*.test.ts', '**/*.test.tsx', '**/*.spec.ts', '**/*.spec.tsx') != ''
        run: |
          if grep -q '"test"' package.json; then
            npm test -- --run
          else
            echo "No test script defined in package.json, skipping tests."
          fi

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-ci

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev

      - name: Check Rust code
        working-directory: src-tauri
        run: cargo check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-ci

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: rust-ci

      - name: Install dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

  docs-format:
    name: Docs Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Cache docs/node_modules
        uses: actions/cache@v4
        id: cache-nm-docs
        with:
          path: docs/node_modules
          key: nm-docs-${{ runner.os }}-${{ hashFiles('docs/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-nm-docs.outputs.cache-hit != 'true'
        working-directory: docs
        run: npm ci

      - name: Check formatting
        working-directory: docs
        run: npm run format:check

  ci-status:
    name: CI status check
    runs-on: ubuntu-latest
    needs:
      [
        format,
        lint,
        frontend-build,
        test,
        rust-check,
        rust-clippy,
        rust-format,
        docs-format,
      ]
    if: always()
    steps:
      - name: Some checks failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: All checks passed
        run: exit 0
